version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misskey-downloader-app
    ports:
      - "3080:3080"
    environment:
      - NODE_ENV=production
      - PORT=3080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: misskey-downloader-redis
    volumes:
      - redis_data:/data
    restart: always

volumes:
  app_data:
  redis_data:
